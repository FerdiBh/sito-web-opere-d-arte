version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: art-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: art_shop

  backend:
    build: ./backend
    container_name: art-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      PORT: 5000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
    command: >
      sh -c "python seed.py && gunicorn --bind 0.0.0.0:5000 --workers 4 --reload app:app"

  frontend:
    build: ./frontend
    container_name: art-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
